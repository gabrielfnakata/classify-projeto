services:
  db:
    env_file: .env
    ports:
      - "${MYSQL_PORT}:3306"
  
  backend:
    env_file: .env
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACK_PORT}:8080"
      - "5005:5005"
    volumes:
      - ./backend:/home/app:z
      - maven-cache:/home/.m2
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:${FRONT_PORT}
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/classify?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo&useSSL=false&allowPublicKeyRetrieval=true

  frontend:
    env_file: .env
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONT_PORT}:5173"
    volumes:
      - ./frontend/src:/app/src:z
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

volumes:
  maven-cache: