services:
  db:
    image: mysql:8
    container_name: db
    restart: always
    env_file: .env
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: classify
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - private_network

  backend:
    build: ./backend
    container_name: backend
    restart: always
    env_file: .env
    environment:
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db
    networks:
      - private_network

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    networks:
      - private_network

volumes:
  db_data:

networks:
  private_network:
    name: private_network
    driver: bridge
