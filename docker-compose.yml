services:
  db:
    image: mysql:8
    container_name: db
    env_file: .env
    restart: always
    environment:
      MYSQL_DATABASE: classify
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - private_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    env_file: .env
    restart: always    
    environment:
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=http://localhost:${FRONT_PORT}
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/classify?createDatabaseIfNotExist=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo&useSSL=false&allowPublicKeyRetrieval=true
    ports:
      - "${BACK_PORT}:8080"
      - "5005:5005"
    volumes:
      - ./backend:/home/ubuntu/app:z
      - maven-cache:/home/ubuntu/.m2
    networks:
      - private_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    env_file: .env
    restart: always
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "${FRONT_PORT}:5173"
    volumes:
      - ./frontend/src:/home/node/app/src:z
      - /home/node/app/node_modules
    networks:
      - private_network

volumes:
  db_data:
  maven-cache:

networks:
  private_network:
    name: private_network
    driver: bridge
