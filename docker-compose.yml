services:
  db-mysql:
    image: mysql:8
    restart: always
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - private_network

  backend:
    build: ./backend
    container_name: spring_maven
    restart: always
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_APPLICATION_NAME=${SPRING_APPLICATION_NAME}
    depends_on:
      - db-mysql
    networks:
      - private_network

  frontend:
    build: ./frontend
    container_name: react_nginx
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend
    networks:
      - private_network

volumes:
  db_data:

networks:
  private_network:
    name: private_network
    driver: bridge