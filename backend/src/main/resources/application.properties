spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.separator=$$

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.application.name=Classify

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration=${JWT_EXPIRATION:28800000}
security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Para Desenvolvimento
logging.level.root=INFO
logging.level.com.suaempresa=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.ddl-auto=validate

spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s